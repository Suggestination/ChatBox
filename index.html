<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatBox Pro | Admin Mode</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        :root { --primary: #8b5cf6; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        #header { padding: 12px 20px; background: rgba(30, 41, 59, 0.9); border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%); }

        /* User List Styles */
        #userListPanel { display: none; background: #1e293b; border-bottom: 1px solid #334155; padding: 12px 20px; max-height: 200px; overflow-y: auto; font-size: 0.9rem; }
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #334155; }
        .user-name { color: #4ade80; font-weight: 500; }

        .msg { padding: 10px 14px; border-radius: 18px; max-width: 85%; font-size: 0.95rem; line-height: 1.4; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .msg.me { align-self: flex-end; background: linear-gradient(135deg, #8b5cf6, #6366f1); border-bottom-right-radius: 4px; }
        .msg.them { align-self: flex-start; background: #334155; border-bottom-left-radius: 4px; }
        .msg-meta { font-size: 0.65rem; opacity: 0.7; margin-bottom: 4px; display: block; font-weight: bold; }

        .input-box { padding: 15px; background: #1e293b; display: flex; gap: 8px; border-top: 1px solid #334155; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        #chatInput { flex: 1; background: #0f172a; border: 1px solid #475569; border-radius: 24px; padding: 12px 20px; color: white; outline: none; font-size: 1rem; }
        
        .btn-group { display: flex; gap: 6px; align-items: center; }
        .btn-ui { background: none; border: 1px solid #475569; color: #94a3b8; font-size: 0.7rem; padding: 6px 10px; border-radius: 6px; cursor: pointer; }
        .btn-kick { background: #ef4444; border: none; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; cursor: pointer; }
        #status-pill { font-size: 0.75rem; font-weight: bold; cursor: pointer; margin-left: 5px; }
        #sendBtn { background: var(--primary); border: none; width: 44px; height: 44px; border-radius: 50%; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="header">
    <h2 style="margin:0; font-size: 1.1rem; letter-spacing: 1px;">CHATBOX</h2>
    <div class="btn-group">
        <button class="btn-ui" onclick="toggleUserList()">Users (<span id="userCount">0</span>)</button>
        <button class="btn-ui" onclick="renameUser()">Rename</button>
        <button class="btn-ui" onclick="clearChat()">Clear</button>
        <div id="status-pill" onclick="connect()">Connecting...</div>
    </div>
</div>

<div id="userListPanel">
    <div id="onlineUsers"></div>
</div>

<div id="chat"></div>

<div class="input-box">
    <input type="text" id="chatInput" placeholder="Type a message..." autocomplete="off">
    <button id="sendBtn" onclick="send()">➤</button>
</div>

<script src="app.js"></script>
</body>
</html>
