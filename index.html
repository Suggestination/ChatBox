<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatBox</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        :root { --primary: #8b5cf6; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; background: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        #chat-header { padding: 15px 20px; background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: linear-gradient(to bottom, #0f172a, #1e1b4b); }

        .msg { padding: 10px 14px; border-radius: 15px; max-width: 80%; font-size: 0.95rem; line-height: 1.4; position: relative; word-wrap: break-word; }
        .msg.me { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .msg.them { align-self: flex-start; background: #334155; color: white; border-bottom-left-radius: 2px; }
        .msg-info { font-size: 0.7rem; opacity: 0.7; margin-bottom: 4px; display: block; font-weight: 600; }

        .input-area { padding: 15px; background: #1e293b; display: flex; gap: 10px; align-items: center; border-top: 1px solid #334155; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        #chatInput { flex: 1; background: #0f172a; border: 1px solid #475569; border-radius: 25px; padding: 12px 18px; color: white; outline: none; font-size: 1rem; }
        button { background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; }
        button:active { transform: scale(0.9); }
    </style>
</head>
<body>

<div id="chat-header">
    <h2 style="margin:0; font-size: 1.2rem;">ChatBox</h2>
    <span id="status" style="font-size: 0.8rem; opacity: 0.6;">Connecting...</span>
</div>

<div id="chat"></div>

<div class="input-area">
    <input type="text" id="chatInput" placeholder="Write a message..." autocomplete="off">
    <button id="sendBtn">➤</button>
</div>

<script src="app.js"></script>
</body>
</html>
