<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatBox | MQTT Messenger</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        :root { --primary: #7c3aed; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; background: var(--bg); color: var(--text); height: 100dvh; display: flex; overflow: hidden; }
        
        /* Sidebar - Hidden on mobile by default */
        #sidebar { width: 260px; background: var(--card); border-right: 1px solid #334155; padding: 20px; display: flex; flex-direction: column; transition: transform 0.3s ease; }
        @media (max-width: 768px) { #sidebar { position: absolute; left: 0; top: 0; bottom: 0; z-index: 10; transform: translateX(-100%); } #sidebar.active { transform: translateX(0); } }
        
        .user-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 8px; font-size: 0.9rem; }
        .status-dot { width: 10px; height: 10px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 10px #22c55e; }

        /* Main Chat Area */
        #chat-container { flex: 1; display: flex; flex-direction: column; background: radial-gradient(circle at top right, #1e1b4b, #0f172a); }
        #chat-header { padding: 15px 20px; border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); }
        #chat-header h2 { margin: 0; font-size: 1.2rem; color: var(--primary); letter-spacing: 1px; }

        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }

        /* Bubbles */
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 85%; line-height: 1.4; font-size: 0.95rem; position: relative; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg.me { align-self: flex-end; background: linear-gradient(135deg, #7c3aed, #4f46e5); border-bottom-right-radius: 4px; color: white; }
        .msg.them { align-self: flex-start; background: #334155; border-bottom-left-radius: 4px; color: white; }
        .msg-meta { font-size: 0.7rem; opacity: 0.7; margin-bottom: 3px; display: block; font-weight: bold; }

        /* Input Area */
        .input-area { padding: 15px; display: flex; gap: 10px; background: #1e293b; border-top: 1px solid #334155; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        input { flex: 1; background: #0f172a; border: 1px solid #475569; border-radius: 25px; padding: 12px 20px; color: white; outline: none; font-size: 1rem; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(124, 58, 237, 0.2); }
        button { background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; flex-shrink: 0; }
        button:active { transform: scale(0.9); }
        
        .menu-toggle { display: none; background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
        @media (max-width: 768px) { .menu-toggle { display: block; } }
    </style>
</head>
<body>

<div id="sidebar">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h3 style="margin:0;">Online</h3>
        <button onclick="toggleMenu()" style="width:30px; height:30px; font-size: 12px; background:#475569;">✕</button>
    </div>
    <div id="userList"></div>
    <button onclick="clearHistory()" style="margin-top:auto; background:#ef4444; border-radius:8px; width:100%; height:40px; font-size: 0.8rem;">Clear History</button>
</div>

<div id="chat-container">
    <div id="chat-header">
        <button class="menu-toggle" onclick="toggleMenu()">☰</button>
        <h2>CHATBOX</h2>
        <div style="width: 30px;"></div> </div>
    <div id="chat"></div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Message..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<script src="app.js"></script>
<script>
    function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
</script>
</body>
</html>
