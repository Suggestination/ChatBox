<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatBox</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        :root { --primary: #a855f7; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        #chat-header { padding: 12px 20px; background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        #status-indicator { font-size: 0.75rem; padding: 4px 10px; border-radius: 12px; background: #334155; }
        
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-image: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0f172a 100%); }

        .msg { padding: 10px 14px; border-radius: 18px; max-width: 85%; font-size: 0.95rem; line-height: 1.4; position: relative; animation: slideUp 0.2s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg.me { align-self: flex-end; background: linear-gradient(135deg, #a855f7, #7c3aed); border-bottom-right-radius: 4px; }
        .msg.them { align-self: flex-start; background: #334155; border-bottom-left-radius: 4px; }
        .msg-info { font-size: 0.65rem; opacity: 0.7; margin-bottom: 4px; display: block; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }

        .input-area { padding: 15px; background: #1e293b; display: flex; gap: 8px; border-top: 1px solid #334155; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        #chatInput { flex: 1; background: #0f172a; border: 1px solid #475569; border-radius: 24px; padding: 12px 18px; color: white; outline: none; font-size: 1rem; }
        button#sendBtn { background: var(--primary); border: none; width: 44px; height: 44px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
        
        .action-btn { background: none; border: 1px solid #475569; color: #94a3b8; font-size: 0.7rem; padding: 4px 8px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<div id="chat-header">
    <h2 style="margin:0; font-size: 1.1rem; letter-spacing: 1px;">CHATBOX</h2>
    <div style="display:flex; align-items: center; gap: 10px;">
        <button class="action-btn" onclick="clearHistory()">Clear Chat</button>
        <span id="status-indicator">Connecting...</span>
    </div>
</div>

<div id="chat"></div>

<div class="input-area">
    <input type="text" id="chatInput" placeholder="Type a message..." autocomplete="off">
    <button id="sendBtn">➤</button>
</div>

<audio id="msgSound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" preload="auto"></audio>

<script src="app.js"></script>
</body>
</html>
