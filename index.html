<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatBox</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        :root { --primary: #8b5cf6; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        * { box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        #header { padding: 12px 20px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        #status-pill { font-size: 0.7rem; padding: 4px 12px; border-radius: 20px; background: #0f172a; color: #94a3b8; cursor: pointer; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 80%; font-size: 0.95rem; line-height: 1.4; margin-bottom: 4px; }
        .msg.me { align-self: flex-end; background: var(--primary); color: white; }
        .msg.them { align-self: flex-start; background: #334155; color: white; }
        .msg-meta { font-size: 0.65rem; opacity: 0.6; display: block; margin-bottom: 2px; }
        .input-box { padding: 15px; background: #1e293b; display: flex; gap: 8px; border-top: 1px solid #334155; }
        #chatInput { flex: 1; background: #0f172a; border: 1px solid #475569; border-radius: 24px; padding: 12px 20px; color: white; outline: none; }
        #sendBtn { background: var(--primary); border: none; width: 44px; height: 44px; border-radius: 50%; color: white; cursor: pointer; font-size: 1.2rem; }
        .btn-clear { background: none; border: 1px solid #ef4444; color: #ef4444; font-size: 0.7rem; padding: 4px 8px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<div id="header">
    <h2 style="margin:0; font-size: 1.1rem;">CHATBOX</h2>
    <div style="display:flex; gap: 10px; align-items:center;">
        <button class="btn-clear" onclick="clearChat()">Clear</button>
        <div id="status-pill" onclick="connect()">Connecting...</div>
    </div>
</div>

<div id="chat"></div>

<div class="input-box">
    <input type="text" id="chatInput" placeholder="Message..." autocomplete="off">
    <button id="sendBtn" onclick="send()">➤</button>
</div>

<script src="app.js"></script>
</body>
</html>
