<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MQTT Messenger Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Inter', system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); height: 100vh; display: flex; }
        
        /* Sidebar */
        #sidebar { width: 260px; background: var(--card); border-right: 1px solid #334155; padding: 20px; display: flex; flex-direction: column; }
        .user-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; font-size: 0.9rem; }
        .status-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 8px #22c55e; }

        /* Chat Window */
        #chat-container { flex: 1; display: flex; flex-direction: column; position: relative; }
        #chat-header { padding: 20px; border-bottom: 1px solid #334155; font-weight: bold; font-size: 1.2rem; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }

        /* Message Bubbles */
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 65%; line-height: 1.4; position: relative; font-size: 0.95rem; }
        .msg.me { align-self: flex-end; background: var(--primary); border-bottom-right-radius: 4px; }
        .msg.them { align-self: flex-start; background: #334155; border-bottom-left-radius: 4px; }
        .msg-meta { font-size: 0.7rem; opacity: 0.6; margin-bottom: 4px; display: block; }

        /* Input Area */
        .input-area { padding: 20px; display: flex; gap: 10px; background: var(--card); }
        input { flex: 1; background: #0f172a; border: 1px solid #334155; border-radius: 12px; padding: 12px; color: white; outline: none; }
        input:focus { border-color: var(--primary); }
        button { background: var(--primary); color: white; border: none; padding: 0 24px; border-radius: 12px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
    </style>
</head>
<body>

<div id="sidebar">
    <h3 style="margin-top: 0;">Online Now</h3>
    <div id="userList"></div>
</div>

<div id="chat-container">
    <div id="chat-header">Global Chat Room</div>
    <div id="chat"></div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
